<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zain Calculator World</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-blur"></div>

  <nav class="navbar">
    <div class="nav-brand">
      <a href="index.html" class="brand-link">Zain Calculator World</a>
    </div>
    <div class="nav-search">
      <input
        type="text"
        id="searchInput"
        placeholder="Search calculators..."
        autocomplete="off"
      />
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </nav>

  <main class="main-content">

    <div class="hero-title">
      <h1>Zain Calculator World</h1>
      <p>All your essential calculators in one place</p>
    </div>

    <div class="cards-grid">

      <div class="category-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <div class="card-title">Fitness &amp; Health</div>
        <ul class="card-list">
          <li><a href="bmi.html">BMI Calculator</a></li>
          <li><a href="calorie.html">Calorie Calculator</a></li>
        </ul>
      </div>

      <div class="category-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <div class="card-title">Academics</div>
        <ul class="card-list">
          <li><a href="gpa.html">GPA Calculator</a></li>
        </ul>
      </div>

      <div class="category-card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
            <line x1="8" y1="6" x2="16" y2="6"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="12" y2="14"/>
          </svg>
        </div>
        <div class="card-title">Math</div>
        <ul class="card-list">
          <li><a href="calculator.html">Simple Calculator</a></li>
        </ul>
      </div>

    </div>

  </main>

  <footer class="footer">
    <p>Powered by Zain Calculator World</p>
    <p>&copy; 2026 All rights reserved</p>
  </footer>

  <script src="search.js"></script>

</body>
</html>
